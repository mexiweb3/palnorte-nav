<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 3D</title>
<style>
body { margin: 0; background: #000; }
canvas { display: block; width: 100vw; height: 100vh; }
#status { position: fixed; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 14px; z-index: 10; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; }
</style>
</head>
<body>
<div id="status">Loading...</div>
<script>
const log = (msg) => { document.getElementById('status').textContent += '\n' + msg; console.log(msg); };

log('1. Loading Three.js...');

const s = document.createElement('script');
s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
s.onload = () => {
  log('2. Three.js loaded: ' + (typeof THREE !== 'undefined'));
  try {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);
    log('3. Scene created');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(30, 20, 30);
    camera.lookAt(0, 0, 0);
    log('4. Camera created');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    log('5. Renderer created: ' + renderer.domElement.width + 'x' + renderer.domElement.height);

    // Light
    scene.add(new THREE.AmbientLight(0x444444));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);

    // Grid
    scene.add(new THREE.GridHelper(50, 20, 0x444488, 0x222244));

    // Test cube
    const geo = new THREE.BoxGeometry(5, 8, 5);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0x330011 });
    const cube = new THREE.Mesh(geo, mat);
    cube.position.set(0, 4, 0);
    scene.add(cube);
    log('6. Cube added');

    // Second cube
    const geo2 = new THREE.BoxGeometry(4, 5, 4);
    const mat2 = new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x003344 });
    const cube2 = new THREE.Mesh(geo2, mat2);
    cube2.position.set(10, 2.5, -5);
    scene.add(cube2);

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();
    log('7. Rendering!');
  } catch(e) {
    log('ERROR: ' + e.message);
    log('Stack: ' + e.stack);
  }
};
s.onerror = () => { log('FAILED to load Three.js'); };
document.head.appendChild(s);
</script>
</body>
</html>
